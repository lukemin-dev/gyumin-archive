name: Generate Resume PDF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/generate_resume.py"
      - ".github/workflows/generate-resume.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          python -m pip install --upgrade pip
          python -m pip install reportlab

      - name: Generate resume PDF
        env:
          RESUME_OUTPUT: public/resume.pdf
        run: python scripts/generate_resume.py

      - name: Commit generated PDF
        run: |
          if git diff --quiet -- public/resume.pdf; then
            echo "Resume PDF is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          git commit -m "Update generated resume PDF"
          git push
