<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">File Organizer Agent 실행 흐름</title>
  <desc id="desc">대상 폴더를 스캔하고 숨김 파일을 제외한 뒤 확장자로 분류하고 dry-run으로 검토한 후 충돌을 처리하며 이동하고 로그를 남기는 흐름</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <text x="90" y="105" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#0f172a">File Organizer Agent</text>
  <text x="90" y="155" font-family="Arial, sans-serif" font-size="24" fill="#64748b">실수 방지를 위해 미리보기부터 실행·로그까지 단계적으로 분리한 Python CLI</text>

  <g filter="url(#shadow)">
    <rect x="65" y="300" width="225" height="180" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="3"/>
    <text x="177" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">1. 폴더 스캔</text>
    <text x="177" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">대상 경로 확인</text>
    <text x="177" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">숨김 파일 제외</text>

    <rect x="375" y="300" width="225" height="180" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="3"/>
    <text x="487" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">2. 분류</text>
    <text x="487" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">확장자 규칙</text>
    <text x="487" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">카테고리 결정</text>

    <rect x="685" y="300" width="225" height="180" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="3"/>
    <text x="797" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">3. Dry-run</text>
    <text x="797" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">이동 계획 출력</text>
    <text x="797" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#ea580c">기본값: 변경 없음</text>

    <rect x="995" y="300" width="225" height="180" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="3"/>
    <text x="1107" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">4. 적용</text>
    <text x="1107" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">--apply 옵션</text>
    <text x="1107" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">파일 이동</text>

    <rect x="1305" y="300" width="225" height="180" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="3"/>
    <text x="1417" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">5. 검증</text>
    <text x="1417" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">중복명 suffix</text>
    <text x="1417" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">로그 기록</text>
  </g>

  <path d="M290 390 H365" stroke="#ea580c" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M600 390 H675" stroke="#ea580c" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M910 390 H985" stroke="#ea580c" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M1220 390 H1295" stroke="#ea580c" stroke-width="7" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="260" y="595" width="1080" height="150" rx="28" fill="#0f172a"/>
    <text x="800" y="645" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">품질 보증</text>
    <text x="480" y="704" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffedd5">pytest 단위·통합 테스트</text>
    <text x="800" y="704" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffedd5">콘솔·파일 로그</text>
    <text x="1120" y="704" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffedd5">GitHub Actions CI</text>
  </g>
</svg>