<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">창고 화재·이상 징후 감지 시스템 구조</title>
  <desc id="desc">MQ-2와 불꽃 센서에서 Raspberry Pi, Flask API, SQLite와 IsolationForest를 거쳐 모바일 대시보드로 이어지는 데이터 흐름</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <text x="90" y="105" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#0f172a">창고 화재·이상 징후 감지 시스템</text>
  <text x="90" y="155" font-family="Arial, sans-serif" font-size="24" fill="#64748b">센서의 연속값을 Edge에서 수집하고 Cloud에서 저장·판정한 뒤 모바일로 전달</text>

  <g filter="url(#shadow)">
    <rect x="80" y="270" width="250" height="210" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="3"/>
    <text x="205" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">센서 입력</text>
    <text x="205" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">MQ-2 가스·연기</text>
    <text x="205" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">불꽃 센서</text>
    <text x="205" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#16a34a">0~1023 아날로그 값</text>

    <rect x="405" y="270" width="270" height="210" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="3"/>
    <text x="540" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">Edge 수집</text>
    <text x="540" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">MCP3008 ADC</text>
    <text x="540" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">Raspberry Pi</text>
    <text x="540" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#16a34a">2초 주기 전송</text>

    <rect x="750" y="270" width="310" height="210" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="3"/>
    <text x="905" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">Cloud API</text>
    <text x="905" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">Flask REST API</text>
    <text x="905" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">SQLite 이력 저장</text>
    <text x="905" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#16a34a">AWS EC2 · systemd</text>

    <rect x="1135" y="270" width="385" height="210" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="3"/>
    <text x="1327" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">판정·시각화</text>
    <text x="1327" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">규칙 기반 경고</text>
    <text x="1327" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">IsolationForest 이상 점수</text>
    <text x="1327" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#16a34a">React Native 대시보드</text>
  </g>

  <path d="M330 375 H395" stroke="#16a34a" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M675 375 H740" stroke="#16a34a" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M1060 375 H1125" stroke="#16a34a" stroke-width="7" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="220" y="590" width="1160" height="160" rx="28" fill="#0f172a"/>
    <text x="800" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">핵심 설계 판단</text>
    <text x="420" y="697" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#dcfce7">디지털 0/1 대신 ADC 연속값</text>
    <text x="800" y="697" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#dcfce7">실제 이상 데이터 부족 → 비지도 이상 탐지</text>
    <text x="1180" y="697" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#dcfce7">센서·AI·앱 전체 흐름 검증</text>
  </g>
</svg>